name: Run Irrigation Script

on:
schedule:
- cron: "0 6 * * *"  # Runs once daily at 06:00 UTC
workflow_dispatch:

jobs:
run-script:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Run script
    env:
      DATABOOM_TOKEN: ${{ secrets.DATABOOM_TOKEN }}
    run: python main.py
```
